<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPY | الجاسوس - ZIDAN DESIGNER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Cairo:wght@400;700&family=Amiri:wght@400;700&family=Press+Start+2P&family=Creepster&family=Monoton&family=Rajdhani:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { margin: 0; min-height: 100vh; transition: 0.3s; position: relative; overflow-x: hidden; }
        
        .app-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: rgba(0,0,0,0.8);
        }
        .logo { font-weight: 900; letter-spacing: 2px; font-size: 1.3rem; display: flex; align-items: center; gap: 8px; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; }
        .screen {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            padding: 20px;
            z-index: 10;
        }
        .screen.active { display: block; }
        .main-btn {
            border: none;
            padding: 14px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.2s;
            text-align: center;
            border-radius: 30px;
        }
        .main-btn:active { transform: scale(0.97); }
        .secondary-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; }
        
        .card {
            background: var(--card-bg, rgba(0,0,0,0.6));
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .map-list { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; }
        .map-category {
            background: var(--card-bg, rgba(0,0,0,0.6));
            border-radius: 24px;
            padding: 18px 20px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .map-category.selected {
            border-color: var(--primary, #fff);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        .map-category i { font-size: 2rem; width: 50px; text-align: center; color: var(--primary, #fff); }
        .category-name { font-size: 1.2rem; font-weight: bold; flex: 1; }
        
        .role-card {
            width: 100%;
            max-width: 340px;
            min-height: 380px;
            background: var(--card-bg, rgba(0,0,0,0.6));
            border-radius: 32px;
            border: 2px solid var(--primary, #fff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            padding: 20px;
            margin: 0 auto;
            transition: 0.1s;
        }
        .role-card.pressed { transform: scale(0.98); }
        .role-content { display: none; flex-direction: column; align-items: center; width: 100%; }
        .role-card.pressed .role-content { display: flex; }
        .role-card.pressed .front-content { display: none; }
        
        .timer-text { font-size: 4rem; text-align: center; margin: 40px 0; font-family: monospace; font-weight: bold; }
        .time-selector { display: flex; gap: 10px; margin: 15px 0; }
        .time-btn { flex: 1; padding: 10px; border-radius: 20px; text-align: center; cursor: pointer; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }
        .time-btn.selected { background: var(--primary); color: #000; }
        
        .player-row {
            background: var(--card-bg, rgba(0,0,0,0.6));
            padding: 12px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        .player-row input { background: none; border: none; color: #fff; flex: 1; font-size: 1rem; text-align: right; outline: none; }
        .remove-icon { cursor: pointer; color: var(--primary); font-size: 1.2rem; }
        
        .players-list { background: var(--card-bg, rgba(0,0,0,0.6)); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .player-item { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        
        .chat-container {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            height: 180px;
            display: flex;
            flex-direction: column;
            margin: 15px 0;
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem; }
        .chat-input-area { display: flex; padding: 10px; gap: 10px; border-top: 1px solid rgba(255,255,255,0.2); }
        .chat-input-area input { flex: 1; background: rgba(0,0,0,0.5); border: none; color: white; padding: 8px 15px; border-radius: 25px; }
        .chat-input-area button { background: var(--primary); border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        .vote-option-btn { padding: 15px; border-radius: 25px; margin: 10px 0; text-align: center; background: rgba(0,0,0,0.5); cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .vote-turn-card { border-radius: 30px; padding: 30px; text-align: center; background: var(--card-bg, rgba(0,0,0,0.6)); }
        
        .side-menu { position: fixed; top: 0; right: -300px; width: 280px; z-index: 2000; transition: 0.4s; padding: 80px 20px 30px; background: var(--card-bg, #0a0a0f); border-left: 2px solid var(--primary); height: 100%; }
        .side-menu.open { right: 0; }
        .menu-overlay { position: fixed; inset: 0; z-index: 1999; display: none; background: rgba(0,0,0,0.8); }
        .menu-overlay.show { display: block; }
        
        .notification { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--primary); color: #000; padding: 15px; border-radius: 50px; text-align: center; z-index: 1000; font-weight: bold; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .countdown-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; color: var(--primary); background: rgba(0,0,0,0.85); padding: 30px 50px; border-radius: 60px; z-index: 3000; font-weight: bold; }
        
        .room-code {
            font-size: 2rem;
            text-align: center;
            letter-spacing: 5px;
            background: var(--primary);
            color: #000;
            padding: 15px;
            border-radius: 20px;
            font-weight: bold;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .copy-btn { background: rgba(0,0,0,0.2); border: none; padding: 8px 15px; border-radius: 30px; cursor: pointer; }
        
        .ready-status { text-align: center; margin-top: 15px; color: var(--primary); font-weight: bold; }
        
        body.theme-cinema { --primary: #ffd93d; --card-bg: rgba(0,0,0,0.6); background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 100%); color: white; }
        body.theme-newspaper { --primary: #d4af7a; --card-bg: rgba(0,0,0,0.6); background: #1a140e; color: #d4af7a; }
        body.theme-warzone { --primary: #8b7355; --card-bg: rgba(0,0,0,0.7); background: #0f0c08; color: #8b7355; }
        body.theme-hologram { --primary: #00ccff; --card-bg: rgba(0,204,255,0.1); background: #03030f; color: #00ccff; }
        body.theme-cartoon { --primary: #ff9999; --card-bg: rgba(0,0,0,0.5); background: #1a0f0f; color: #ff9999; }
        
        .intro-animation { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: introFadeOut 0.5s forwards; animation-delay: 3.5s; }
        @keyframes introFadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes letterReveal { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="theme-cinema">

<div class="app-header">
    <div class="menu-icon" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="logo"><i class="fas fa-user-secret"></i> SPY</div>
    <div style="width: 24px;"></div>
</div>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <h2 style="color: var(--primary); margin-bottom: 20px;">الإعدادات</h2>
    <button class="main-btn" onclick="switchTheme('cinema')">🎬 سينمائي</button>
    <button class="main-btn" onclick="switchTheme('newspaper')">📰 جريدة قديمة</button>
    <button class="main-btn" onclick="switchTheme('warzone')">⚔️ حرب</button>
    <button class="main-btn" onclick="switchTheme('hologram')">💠 هولوجرام</button>
    <button class="main-btn" onclick="switchTheme('cartoon')">🎨 كارتون</button>
    <hr style="margin: 15px 0;">
    <button class="main-btn" onclick="resetToHome()" style="background:#333;">الرئيسية</button>
</div>

<!-- Home Screen -->
<div id="homeScreen" class="screen active">
    <div style="text-align: center; padding-top: 80px;">
        <i class="fas fa-user-secret" style="font-size: 100px; color: var(--primary);"></i>
        <h1 style="font-family: 'Orbitron'; margin: 30px 0;">SPY</h1>
        <div style="max-width: 300px; margin: auto;">
            <button class="main-btn" onclick="startOfflineMode()">📱 لعبة أوفلاين</button>
            <button class="main-btn" onclick="showOnlineMenu()">🌐 لعبة أونلاين</button>
            <button class="main-btn secondary-btn" onclick="openHowtoVideo()">📖 شرح اللعبة</button>
        </div>
    </div>
</div>

<div id="howto" class="screen">
    <div class="video-container" id="videoContainer"></div>
</div>

<!-- Offline Screens -->
<div id="mapSelection" class="screen">
    <h2 style="text-align: center;">اختر مسرح الجريمة</h2>
    <div class="map-list" id="mapList"></div>
    <div class="card">
        <p>⏱️ مدة النقاش:</p>
        <div class="time-selector" id="timeSelector">
            <div class="time-btn" data-time="120">2 دقائق</div>
            <div class="time-btn selected" data-time="300">5 دقائق</div>
            <div class="time-btn" data-time="600">10 دقائق</div>
        </div>
    </div>
    <button class="main-btn" onclick="navTo('playerSetup')">التالي</button>
</div>

<div id="playerSetup" class="screen">
    <h2 style="text-align: center;">تسجيل العملاء</h2>
    <div id="list" style="margin-bottom: 15px;"></div>
    <button class="main-btn secondary-btn" onclick="addPlayer()">+ إضافة لاعب</button>
    <button class="main-btn" onclick="startOfflineGame()">توزيع الهويات</button>
</div>

<!-- Online Screens -->
<div id="onlineMenuScreen" class="screen">
    <div class="card" style="text-align: center;">
        <button class="main-btn" onclick="showCreateRoomUI()">➕ إنشاء غرفة جديدة</button>
        <button class="main-btn" onclick="showJoinRoomUI()">🔗 الانضمام إلى غرفة</button>
        <button class="main-btn secondary-btn" onclick="goHome()">رجوع</button>
    </div>
</div>

<div id="createRoomScreen" class="screen">
    <div class="card">
        <input type="text" id="onlineHostName" placeholder="اسمك" style="width:100%; padding:12px; border-radius:30px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); color:white;">
        <button class="main-btn" onclick="createOnlineRoom()">إنشاء غرفة</button>
        <button class="main-btn secondary-btn" onclick="backToOnlineMenu()">رجوع</button>
    </div>
</div>

<div id="joinRoomScreen" class="screen">
    <div class="card">
        <input type="text" id="joinRoomCodeInput" placeholder="كود الغرفة" maxlength="6" style="text-transform:uppercase; width:100%; padding:12px; border-radius:30px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); color:white;">
        <input type="text" id="joinPlayerNameInput" placeholder="اسمك" style="width:100%; padding:12px; border-radius:30px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); color:white; margin-top:10px;">
        <button class="main-btn" onclick="joinOnlineRoom()">انضمام</button>
        <button class="main-btn secondary-btn" onclick="backToOnlineMenu()">رجوع</button>
    </div>
</div>

<div id="onlineWaitingScreen" class="screen">
    <div class="card" style="text-align: center;">
        <div>كود الغرفة</div>
        <div class="room-code" id="waitingRoomCodeDisplay">
            <span id="roomCodeText">-----</span>
            <button class="copy-btn" onclick="copyRoomCode()">📋 نسخ</button>
        </div>
        <div class="players-list" id="waitingPlayersList"></div>
        <button class="main-btn" id="startOnlineGameBtn" style="display:none" onclick="hostStartOnlineGame()">🎯 بدء اللعبة (اختيار المكان)</button>
        <button class="main-btn secondary-btn" onclick="leaveOnlineRoom()">مغادرة</button>
    </div>
</div>

<!-- Shared Screens -->
<div id="rolesScreen" class="screen">
    <h2 id="turnText" style="text-align: center; color: var(--primary);"></h2>
    <div class="card-container">
        <div class="role-card" id="roleCard">
            <div class="front-content">
                <i class="fas fa-fingerprint fingerprint-icon" style="font-size: 4rem;"></i>
                <p>اضغط لرؤية مهمتك</p>
            </div>
            <div class="role-content" id="roleContent"></div>
        </div>
    </div>
    <div id="roleNextContainer" style="text-align: center; margin-top: 20px;"></div>
</div>

<div id="gameplay" class="screen">
    <div class="timer-text" id="timer">05:00</div>
    <div class="players-list">
        <h3>👥 اللاعبون</h3>
        <div id="playersNamesList"></div>
    </div>
    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="اكتب رسالتك...">
            <button onclick="sendChatMessage()">إرسال</button>
        </div>
    </div>
    <button class="main-btn" id="voteBtn" style="background: #d32f2f;" onclick="triggerVote()">اتهام الجاسوس</button>
</div>

<div id="votePage" class="screen">
    <h2 style="text-align: center; color: var(--primary);">🗳️ التصويت</h2>
    <div id="voteTurnContainer"></div>
</div>

<div id="voteResultsPage" class="screen">
    <h2 style="text-align: center; color: var(--primary);">📊 النتيجة</h2>
    <div id="resultsSection"></div>
    <button class="main-btn" id="newGameBtn" onclick="newGameAfterResult()">🔄 لعبة جديدة</button>
    <button class="main-btn secondary-btn" onclick="resetToHome()">الرئيسية</button>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAAAYnRPWgzCuZxt99uvx2BA90dDGwaC7c",
        authDomain: "spy1-d766d.firebaseapp.com",
        databaseURL: "https://spy1-d766d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "spy1-d766d",
        storageBucket: "spy1-d766d.firebasestorage.app",
        messagingSenderId: "318881354838",
        appId: "1:318881354838:web:00db6be734e40cfeed57f7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Data
    const MAP_DATA = {
        'public': ["مطار", "بنك", "مطعم", "سينما", "مستشفى", "مدرسة", "متحف", "مركز تسوق", "صالة ألعاب", "محطة قطار", "مقهى", "مكتبة", "نادي رياضي", "قاعة حفلات", "معرض فني", "محطة بنزين", "حديقة حيوان", "مدينة ملاهي", "سوق شعبي"],
        'sci-fi': ["محطة فضاء", "مفاعل نووي", "غواصة فضائية", "قاعدة مريخية", "سفينة فضائية", "مختبر سري", "مدينة تحت الماء", "كوكب بعيد"],
        'travel': ["برج إيفل", "الأهرامات", "سور الصين العظيم", "الكولوسيوم", "مدينة البندقية", "تاج محل", "جزيرة الفصح", "معبد الأقصر"],
        'home': ["المطبخ", "غرفة المعيشة", "القبو", "الحمام", "غرفة النوم", "المرآب", "الحديقة الخلفية", "العلية"],
        'cities': ["القاهرة", "باريس", "نيويورك", "طوكيو", "لندن", "دبي", "روما", "برلين"],
        'entertainment': ["ستوديو أفلام", "مدينة ألعاب", "سيرك", "دار أوبرا", "ملعب كرة قدم", "حلبة سباق", "قاعة مؤتمرات", "نادي ليلي"]
    };

    const howtoData = [
        { icon: "fas fa-theater-masks", title: "🎭 الأدوار", desc: "يتم توزيع الأدوار عشوائياً: أحدكم هو الجاسوس، والباقي عملاء يعرفون الموقع السري." },
        { icon: "fas fa-fingerprint", title: "🕵️ مرحلة الأدوار", desc: "اضغط على البصمة لرؤية دورك." },
        { icon: "fas fa-comments", title: "💬 النقاش", desc: "وقت محدد للتحدث واكتشاف الجاسوس." },
        { icon: "fas fa-vote-yea", title: "⚖️ التصويت", desc: "كل لاعب يصوت على المشتبه به." },
        { icon: "fas fa-trophy", title: "🏆 الفوز", desc: "الجاسوس يفوز إذا بقي معه لاعب واحد فقط." }
    ];

    // Global Vars
    let gameMode = null;
    let players = [], activePlayers = [], spyIndex = -1, currentLocation = "", selectedMapKey = 'public', selectedTime = 300;
    let currentPlayerIndex = 0, hasSeenRole = false, timerInterval = null;
    let votes = {}, voteOrder = [], currentVoterIndex = 0;
    
    // Online Vars
    let currentRoomId = null, currentPlayerName = null, isHost = false;
    let onlinePlayers = [], onlineSpyIndex = -1, onlineLocation = "", gameStarted = false;
    let chatListener = null, isVotingActive = false;

    // Helper Functions
    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
    function navTo(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function showNotification(msg) { let n = document.createElement('div'); n.className = 'notification'; n.innerHTML = msg; document.body.appendChild(n); setTimeout(() => n.remove(), 3000); }
    function switchTheme(theme) { document.body.className = 'theme-' + theme; toggleMenu(); }
    function resetToHome() { if(timerInterval) clearInterval(timerInterval); if(currentRoomId) leaveOnlineRoom(); navTo('homeScreen'); gameMode = null; }
    function goHome() { resetToHome(); }
    function copyRoomCode() { const code = document.getElementById('roomCodeText').innerText; navigator.clipboard.writeText(code); showNotification("✅ تم نسخ الكود: " + code); }
    
    function openHowtoVideo() {
        navTo('howto');
        const container = document.getElementById('videoContainer');
        container.innerHTML = '';
        const welcomeDiv = document.createElement('div'); welcomeDiv.className = 'welcome-screen'; welcomeDiv.innerHTML = `<div class="welcome-icon"><i class="fas fa-user-secret"></i></div><div class="welcome-title">أهلاً بك في SPY</div><div class="welcome-sub">إليك شرح طريقة اللعب...</div>`;
        container.appendChild(welcomeDiv);
        const gridDiv = document.createElement('div'); gridDiv.className = 'info-grid';
        howtoData.forEach(data => { const card = document.createElement('div'); card.className = 'info-card-item'; card.innerHTML = `<div class="card-icon"><i class="${data.icon}"></i></div><div class="card-content"><h3>${data.title}</h3><p>${data.desc}</p></div>`; gridDiv.appendChild(card); });
        container.appendChild(gridDiv);
        const closeBtn = document.createElement('button'); closeBtn.className = 'main-btn'; closeBtn.innerText = 'رجوع'; closeBtn.onclick = () => navTo('homeScreen'); container.appendChild(closeBtn);
    }

    // Offline Mode
    function startOfflineMode() { gameMode = 'offline'; buildMapList(); setupTimeSelector(); buildPlayerList(); navTo('mapSelection'); }
    function buildMapList() {
        const container = document.getElementById('mapList'); container.innerHTML = '';
        const categories = [
            { key: 'public', name: 'أماكن عامة', icon: 'fa-city' }, { key: 'sci-fi', name: 'خيال علمي', icon: 'fa-atom' },
            { key: 'travel', name: 'معالم سياحية', icon: 'fa-landmark' }, { key: 'home', name: 'المنزل', icon: 'fa-home' },
            { key: 'cities', name: 'مدن عالمية', icon: 'fa-globe' }, { key: 'entertainment', name: 'ترفيه', icon: 'fa-gamepad' }
        ];
        categories.forEach(cat => {
            const div = document.createElement('div'); div.className = 'map-category' + (cat.key === selectedMapKey ? ' selected' : '');
            div.innerHTML = `<i class="fas ${cat.icon}"></i><span class="category-name">${cat.name}</span>`;
            div.onclick = () => { document.querySelectorAll('.map-category').forEach(c => c.classList.remove('selected')); div.classList.add('selected'); selectedMapKey = cat.key; };
            container.appendChild(div);
        });
    }
    function setupTimeSelector() { const btns = document.querySelectorAll('.time-btn'); btns.forEach(btn => btn.onclick = () => { btns.forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedTime = parseInt(btn.dataset.time); }); }
    function buildPlayerList() { const container = document.getElementById('list'); container.innerHTML = ''; for (let i = 0; i < 3; i++) { const row = document.createElement('div'); row.className = 'player-row'; row.innerHTML = `<i class="fas fa-times remove-icon" onclick="this.parentElement.remove()"></i><input type="text" placeholder="أضف اسمك هنا" class="p-name">`; container.appendChild(row); } }
    function addPlayer() { const container = document.getElementById('list'); const row = document.createElement('div'); row.className = 'player-row'; row.innerHTML = `<i class="fas fa-times remove-icon" onclick="this.parentElement.remove()"></i><input type="text" placeholder="أضف اسمك هنا" class="p-name">`; container.appendChild(row); }
    function startOfflineGame() {
        players = Array.from(document.querySelectorAll('.p-name')).map(i => i.value.trim()).filter(p => p !== "");
        if (players.length < 3) { showNotification("يلزم 3 لاعبين على الأقل"); return; }
        activePlayers = [...players];
        currentLocation = MAP_DATA[selectedMapKey][Math.floor(Math.random() * MAP_DATA[selectedMapKey].length)];
        spyIndex = Math.floor(Math.random() * players.length);
        currentPlayerIndex = 0; hasSeenRole = false;
        showOfflineRoleScreen();
    }
    function showOfflineRoleScreen() {
        navTo('rolesScreen');
        document.getElementById('turnText').innerText = players[currentPlayerIndex];
        document.getElementById('roleContent').innerHTML = (currentPlayerIndex === spyIndex) ? `<i class="fas fa-user-secret fa-4x" style="color:red"></i><h2>❗ أنت الجاسوس ❗</h2><p>لا تعرف المكان</p>` : `<i class="fas fa-map-marker-alt fa-3x" style="color:var(--primary)"></i><p>الموقع السري:</p><h1>${currentLocation}</h1>`;
        document.getElementById('roleCard').classList.remove('pressed');
        document.getElementById('roleNextContainer').innerHTML = '';
        attachPressEvents(document.getElementById('roleCard'), true);
    }
    function attachPressEvents(card, isOffline) {
        const startPress = (e) => { e.preventDefault(); card.classList.add('pressed'); if(!hasSeenRole) { hasSeenRole = true; if(isOffline) document.getElementById('roleNextContainer').innerHTML = '<button class="main-btn" onclick="nextOfflinePlayer()">التالي</button>'; } };
        const endPress = (e) => { e.preventDefault(); card.classList.remove('pressed'); };
        card.addEventListener('mousedown', startPress); card.addEventListener('mouseup', endPress); card.addEventListener('mouseleave', endPress);
        card.addEventListener('touchstart', startPress, { passive: false }); card.addEventListener('touchend', endPress);
    }
    function nextOfflinePlayer() { currentPlayerIndex++; if (currentPlayerIndex < players.length) showOfflineRoleScreen(); else startOfflineGameplay(); }
    function startOfflineGameplay() { document.getElementById('playersNamesList').innerHTML = players.map(p => `<div style="padding:8px; background:var(--card-bg); margin:5px 0; border-radius:12px;">🎭 ${p}</div>`).join(''); navTo('gameplay'); document.getElementById('chatContainer').style.display = 'none'; startTimer(selectedTime); }

    // Online Mode
    function showOnlineMenu() { gameMode = 'online'; navTo('onlineMenuScreen'); }
    function backToOnlineMenu() { navTo('onlineMenuScreen'); }
    function showCreateRoomUI() { navTo('createRoomScreen'); }
    function showJoinRoomUI() { navTo('joinRoomScreen'); }
    
    function createOnlineRoom() {
        let name = document.getElementById('onlineHostName').value.trim();
        if(!name) { showNotification("أدخل اسمك"); return; }
        currentPlayerName = name; isHost = true;
        currentRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        db.ref('rooms/' + currentRoomId).set({ players: [name], host: name, status: "waiting", ready: [], createdAt: Date.now() });
        listenToOnlineRoom();
        document.getElementById('roomCodeText').innerText = currentRoomId;
        navTo('onlineWaitingScreen');
    }
    
    function joinOnlineRoom() {
        let code = document.getElementById('joinRoomCodeInput').value.trim().toUpperCase();
        let name = document.getElementById('joinPlayerNameInput').value.trim();
        if(!code || !name) { showNotification("أدخل الكود والاسم"); return; }
        db.ref('rooms/' + code).once('value', snap => {
            if(!snap.exists()) { showNotification("الغرفة غير موجودة"); return; }
            let room = snap.val();
            if(room.status !== "waiting") { showNotification("اللعبة بدأت"); return; }
            if(room.players.includes(name)) { showNotification("الاسم موجود"); return; }
            room.players.push(name);
            db.ref('rooms/' + code).update({ players: room.players }).then(() => {
                currentRoomId = code; currentPlayerName = name; isHost = false;
                listenToOnlineRoom();
                document.getElementById('roomCodeText').innerText = code;
                navTo('onlineWaitingScreen');
            });
        });
    }
    
    function listenToOnlineRoom() {
        db.ref('rooms/' + currentRoomId).on('value', snap => {
            let room = snap.val();
            if(!room) return;
            onlinePlayers = room.players || [];
            let container = document.getElementById('waitingPlayersList');
            if(container) { container.innerHTML = "<h3>اللاعبون:</h3>" + onlinePlayers.map(p => `<div class="player-item"><span>${p}</span>${p === room.host ? ' 👑' : ''}</div>`).join(''); }
            let startBtn = document.getElementById('startOnlineGameBtn');
            if(startBtn && isHost && onlinePlayers.length >= 3) startBtn.style.display = 'block';
            
            if(room.status === "playing" && !gameStarted) {
                gameStarted = true;
                onlineLocation = room.location;
                onlineSpyIndex = room.spyIndex;
                activePlayers = [...onlinePlayers];
                showOnlineRoleScreen();
            }
            
            if(room.voteTrigger && !isVotingActive) { isVotingActive = true; startVotingPhase(); }
            if(room.voteResults) { showVoteResultsScreen(room.voteResults); }
        });
    }
    
    function hostStartOnlineGame() {
        if(!isHost) return;
        // المضيف يختار المكان من قائمة الأماكن
        let locationList = MAP_DATA[selectedMapKey || 'public'];
        let randomLocation = locationList[Math.floor(Math.random() * locationList.length)];
        let randomSpy = Math.floor(Math.random() * onlinePlayers.length);
        db.ref('rooms/' + currentRoomId).update({ status: "playing", location: randomLocation, spyIndex: randomSpy, ready: [] });
    }
    
    function showOnlineRoleScreen() {
        navTo('rolesScreen');
        let myIndex = onlinePlayers.indexOf(currentPlayerName);
        let isSpy = (myIndex === onlineSpyIndex);
        document.getElementById('turnText').innerText = currentPlayerName;
        document.getElementById('roleContent').innerHTML = isSpy ? `<i class="fas fa-user-secret fa-4x" style="color:red"></i><h2>❗ أنت الجاسوس ❗</h2><p>لا تعرف المكان</p>` : `<i class="fas fa-map-marker-alt fa-3x" style="color:var(--primary)"></i><p>الموقع السري:</p><h1>${onlineLocation}</h1>`;
        document.getElementById('roleCard').classList.remove('pressed');
        document.getElementById('roleNextContainer').innerHTML = '';
        attachOnlinePressEvents(document.getElementById('roleCard'));
    }
    
    function attachOnlinePressEvents(card) {
        const startPress = (e) => { 
            e.preventDefault(); 
            card.classList.add('pressed');
            // تسجيل أن هذا اللاعب شاف مهمته
            db.ref('rooms/' + currentRoomId + '/ready').transaction(val => {
                let arr = val || [];
                if(!arr.includes(currentPlayerName)) arr.push(currentPlayerName);
                return arr;
            });
            document.getElementById('roleNextContainer').innerHTML = '<div class="ready-status">✅ تم مشاهدة مهمتك! في انتظار باقي اللاعبين...</div>';
        };
        const endPress = (e) => { e.preventDefault(); card.classList.remove('pressed'); };
        card.addEventListener('mousedown', startPress); card.addEventListener('mouseup', endPress); card.addEventListener('mouseleave', endPress);
        card.addEventListener('touchstart', startPress, { passive: false }); card.addEventListener('touchend', endPress);
    }
    
    // دالة للمضيف يضغط عليها بعد ما الكل شاف مهمته
    function startGameWhenReady() {
        db.ref('rooms/' + currentRoomId + '/ready').once('value', snap => {
            let readyArr = snap.val() || [];
            if(readyArr.length === onlinePlayers.length && onlinePlayers.length > 0) {
                startGlobalCountdown();
            } else {
                showNotification("❌ ليس كل اللاعبين شافوا مهمتهم بعد!");
            }
        });
    }
    
    function startGlobalCountdown() {
        let count = 5;
        const overlay = document.createElement('div'); overlay.className = 'countdown-overlay'; overlay.innerText = count; document.body.appendChild(overlay);
        const interval = setInterval(() => { count--; if(count <= 0) { clearInterval(interval); overlay.remove(); startOnlineGameplay(); } else overlay.innerText = count; }, 1000);
    }
    
    function startOnlineGameplay() {
        navTo('gameplay');
        document.getElementById('playersNamesList').innerHTML = onlinePlayers.map(p => `<div style="padding:8px; background:var(--card-bg); margin:5px 0; border-radius:12px;">🎭 ${p}</div>`).join('');
        document.getElementById('chatContainer').style.display = 'flex';
        startTimer(300);
        setupChat();
    }
    
    function setupChat() {
        let container = document.getElementById('chatMessages');
        container.innerHTML = '<div>💬 دخلت غرفة النقاش</div>';
        if(chatListener) db.ref('rooms/' + currentRoomId + '/chats').off();
        chatListener = db.ref('rooms/' + currentRoomId + '/chats').on('child_added', snap => { let msg = snap.val(); if(msg) { let div = document.createElement('div'); div.innerHTML = `<strong>${msg.name}:</strong> ${msg.text}`; container.appendChild(div); container.scrollTop = container.scrollHeight; } });
    }
    
    function sendChatMessage() {
        let input = document.getElementById('chatInput');
        let text = input.value.trim();
        if(!text || !currentRoomId) return;
        db.ref('rooms/' + currentRoomId + '/chats').push({ name: currentPlayerName, text: text });
        input.value = '';
    }
    
    function startTimer(seconds) {
        if(timerInterval) clearInterval(timerInterval);
        let remaining = seconds;
        const timerEl = document.getElementById('timer');
        const update = () => { let m = Math.floor(remaining/60), s = remaining%60; timerEl.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; };
        update();
        timerInterval = setInterval(() => { if(remaining <= 0) { clearInterval(timerInterval); triggerVote(); } else { remaining--; update(); } }, 1000);
    }
    
    function triggerVote() {
        if(timerInterval) clearInterval(timerInterval);
        if(gameMode === 'online') { db.ref('rooms/' + currentRoomId).update({ voteTrigger: true }); }
        else { startVotingPhase(); }
    }
    
    function startVotingPhase() {
        votes = {}; voteOrder = [...activePlayers]; currentVoterIndex = 0;
        showNextVoter();
    }
    
    function showNextVoter() {
        if(currentVoterIndex >= voteOrder.length) { calculateVoteResult(); return; }
        let voter = voteOrder[currentVoterIndex];
        let others = activePlayers.filter(p => p !== voter);
        let container = document.getElementById('voteTurnContainer');
        container.innerHTML = `<div class="vote-turn-card"><div class="vote-turn-name">🎭 ${voter}</div><div class="vote-options"></div><div class="vote-progress">الدور ${currentVoterIndex + 1} من ${voteOrder.length}</div></div>`;
        let optionsContainer = container.querySelector('.vote-options');
        others.forEach(p => { let btn = document.createElement('div'); btn.className = 'vote-option-btn'; btn.innerText = p; btn.onclick = () => { votes[voter] = p; currentVoterIndex++; showNextVoter(); }; optionsContainer.appendChild(btn); });
        navTo('votePage');
    }
    
    function calculateVoteResult() {
        let voteCount = {};
        Object.values(votes).forEach(v => voteCount[v] = (voteCount[v] || 0) + 1);
        let maxVotes = 0, accused = null;
        for(let [player, count] of Object.entries(voteCount)) if(count > maxVotes) { maxVotes = count; accused = player; }
        let accusedIndex = activePlayers.indexOf(accused);
        let currentSpy = (gameMode === 'offline') ? spyIndex : onlineSpyIndex;
        let isSpy = (accusedIndex === currentSpy);
        
        // قاعدة الفوز الجديدة: الجاسوس يفوز إذا بقي هو + لاعب واحد فقط
        let spyWins = false;
        if(!isSpy) {
            // تم اتهام بريء
            let remainingAfterElimination = activePlayers.length - 1;
            if(remainingAfterElimination <= 2) {
                spyWins = true;
            }
        }
        
        let resultMsg = "";
        if(isSpy) {
            resultMsg = `✅ تم اكتشاف الجاسوس (${accused})! العملاء يفوزون!`;
        } else if(spyWins) {
            resultMsg = `💀 تم إقصاء ${accused} (بريء)! تبقى ${activePlayers.length - 1} لاعبين والجاسوس بينهم... الجاسوس يفوز!`;
        } else {
            resultMsg = `❌ تم اتهام ${accused} (بريء)! تستمر الجولة.`;
        }
        
        document.getElementById('resultsSection').innerHTML = `<div class="vote-results"><h3>نتائج التصويت:</h3>${Object.entries(voteCount).map(([player, count]) => `<div class="vote-result-row"><span>${player}</span><span class="vote-count">${count} صوت</span></div>`).join('')}<hr><div style="text-align: center; padding: 15px;"><h3 style="color: var(--primary);">المتهم: ${accused}</h3><p>${resultMsg}</p></div></div>`;
        
        if(gameMode === 'online') {
            db.ref('rooms/' + currentRoomId).update({ voteResults: { accused: accused, isSpy: isSpy, resultMsg: resultMsg, spyWins: spyWins } });
        }
        navTo('voteResultsPage');
    }
    
    function showVoteResultsScreen(data) {
        document.getElementById('resultsSection').innerHTML = `<div class="vote-results"><h3>نتائج التصويت:</h3><div style="text-align: center; padding: 15px;"><h3 style="color: var(--primary);">المتهم: ${data.accused}</h3><p>${data.resultMsg}</p></div></div>`;
        navTo('voteResultsPage');
    }
    
    function newGameAfterResult() {
        if(gameMode === 'online' && isHost) {
            // المضيف يبدأ لعبة جديدة بنفس الغرفة
            let locationList = MAP_DATA[selectedMapKey || 'public'];
            let newLocation = locationList[Math.floor(Math.random() * locationList.length)];
            let newSpy = Math.floor(Math.random() * onlinePlayers.length);
            db.ref('rooms/' + currentRoomId).update({
                status: "playing",
                location: newLocation,
                spyIndex: newSpy,
                ready: [],
                voteTrigger: null,
                voteResults: null,
                countdownStarted: null
            });
            gameStarted = false;
            showNotification("🔄 بدء جولة جديدة...");
        } else if(gameMode === 'offline') {
            startOfflineMode();
        } else {
            showNotification("انتظر المضيف لبدء جولة جديدة");
        }
    }
    
    function processVoteResult() { 
        if(gameMode === 'online' && isHost) {
            newGameAfterResult();
        } else {
            resetToHome();
        }
    }
    
    function leaveOnlineRoom() { if(currentRoomId) db.ref('rooms/' + currentRoomId).remove(); currentRoomId = null; navTo('homeScreen'); }
    
    // ربط الدوال
    window.startOfflineMode = startOfflineMode;
    window.showOnlineMenu = showOnlineMenu;
    window.showCreateRoomUI = showCreateRoomUI;
    window.showJoinRoomUI = showJoinRoomUI;
    window.createOnlineRoom = createOnlineRoom;
    window.joinOnlineRoom = joinOnlineRoom;
    window.hostStartOnlineGame = hostStartOnlineGame;
    window.startGameWhenReady = startGameWhenReady;
    window.leaveOnlineRoom = leaveOnlineRoom;
    window.backToOnlineMenu = backToOnlineMenu;
    window.goHome = goHome;
    window.resetToHome = resetToHome;
    window.openHowtoVideo = openHowtoVideo;
    window.toggleMenu = toggleMenu;
    window.switchTheme = switchTheme;
    window.addPlayer = addPlayer;
    window.copyRoomCode = copyRoomCode;
    window.navTo = navTo;
    window.nextOfflinePlayer = nextOfflinePlayer;
    window.sendChatMessage = sendChatMessage;
    window.triggerVote = triggerVote;
    window.newGameAfterResult = newGameAfterResult;
    window.processVoteResult = processVoteResult;
</script>

<div class="intro-animation">
    <div style="font-size: 5rem;"><i class="fas fa-user-secret" style="color: #ffd93d;"></i></div>
    <div style="display: flex; flex-direction: row-reverse; margin-top: 20px;">
        <span style="font-family: 'Orbitron'; font-size: 3rem; animation: letterReveal 0.4s forwards; animation-delay: 0.5s; opacity:0;">S</span>
        <span style="font-family: 'Orbitron'; font-size: 3rem; animation: letterReveal 0.4s forwards; animation-delay: 1s; opacity:0;">P</span>
        <span style="font-family: 'Orbitron'; font-size: 3rem; animation: letterReveal 0.4s forwards; animation-delay: 1.5s; opacity:0;">Y</span>
    </div>
</div>

</body>
</html>
