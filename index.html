<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPY | الجاسوس - ZIDAN DESIGNER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        /* ==================== الكود الأساسي الأصلي ==================== */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Cairo:wght@400;700&family=Amiri:wght@400;700&family=Press+Start+2P&family=Creepster&family=Monoton&family=Rajdhani:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { margin: 0; min-height: 100vh; transition: 0.3s; position: relative; overflow-x: hidden; }
        
        .app-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }
        .logo { font-weight: 900; letter-spacing: 2px; font-size: 1.3rem; display: flex; align-items: center; gap: 8px; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; }
        .screen {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            padding: 20px;
            z-index: 10;
        }
        .screen.active { display: block; }
        .main-btn {
            border: none;
            padding: 14px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.2s;
            text-align: center;
        }
        .main-btn:active { transform: scale(0.97); }
        .secondary-btn { background: transparent; }
        
        /* [ستايل الميكروفون الجديد] */
        .voice-control-btn {
            position: fixed;
            bottom: 90px;
            left: 20px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 2px solid var(--primary);
            color: var(--primary);
            display: none; /* يظهر في الجيم بلاي فقط */
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 1001;
            box-shadow: 0 0 15px var(--glow);
            cursor: pointer;
        }
        .voice-control-btn.on { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }
        .speaking-indicator-ui { color: var(--primary); margin-right: 10px; font-size: 0.8rem; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .video-container {
            position: relative;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .welcome-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            animation: welcomeFadeOut 2s ease-in-out forwards;
            z-index: 20;
        }
        @keyframes welcomeFadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); visibility: hidden; }
        }
        .welcome-icon { font-size: 5rem; margin-bottom: 20px; animation: iconGlow 1s ease-out; }
        @keyframes iconGlow {
            0% { text-shadow: 0 0 0 var(--primary); transform: scale(0); }
            100% { text-shadow: 0 0 30px var(--primary); transform: scale(1); }
        }
        .welcome-title { font-size: 2rem; font-weight: bold; margin-bottom: 10px; }
        .welcome-sub { font-size: 1rem; opacity: 0.8; }
        
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            opacity: 0;
            animation: gridReveal 0.5s ease-out forwards;
            animation-delay: 2s;
        }
        @keyframes gridReveal { to { opacity: 1; } }
        
        .info-card-item {
            background: var(--card-bg, rgba(0,0,0,0.6));
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 18px;
            border: 1px solid rgba(255,255,255,0.2);
            transform: translateX(-50px);
            opacity: 0;
            animation: slideInCard 0.5s ease-out forwards;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-card-item:hover {
            transform: translateX(0) scale(1.02);
            border-color: var(--primary, #fff);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        @keyframes slideInCard {
            to { transform: translateX(0); opacity: 1; }
        }
        .info-card-item:nth-child(1) { animation-delay: 2.2s; }
        .info-card-item:nth-child(2) { animation-delay: 2.5s; }
        .info-card-item:nth-child(3) { animation-delay: 2.8s; }
        .info-card-item:nth-child(4) { animation-delay: 3.1s; }
        .info-card-item:nth-child(5) { animation-delay: 3.4s; }
        
        .card-icon { font-size: 2.5rem; width: 60px; text-align: center; }
        .card-content { flex: 1; }
        .card-content h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .card-content p { font-size: 0.85rem; opacity: 0.9; line-height: 1.4; }
        
        .timeline-bar {
            width: 100%;
            max-width: 500px;
            margin: 30px auto 20px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            animation: fadeInBar 0.5s forwards;
            animation-delay: 2s;
        }
        @keyframes fadeInBar { to { opacity: 1; } }
        .timeline-progress {
            width: 0%;
            height: 100%;
            background: var(--primary, #fff);
            border-radius: 3px;
            animation: progressBar 3s ease-out forwards;
            animation-delay: 2s;
        }
        @keyframes progressBar { 0% { width: 0%; } 100% { width: 100%; } }
        
        .close-howto-btn {
            margin-top: 20px;
            opacity: 0;
            animation: fadeInBtn 0.5s forwards;
            animation-delay: 3.8s;
        }
        @keyframes fadeInBtn { to { opacity: 1; } }
        
        .map-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }
        .map-category {
            background: var(--card-bg, rgba(0,0,0,0.6));
            border-radius: 24px;
            padding: 18px 20px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .map-category.selected {
            border-color: var(--primary, #fff);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px var(--glow, rgba(255,255,255,0.3));
        }
        .map-category i {
            font-size: 2rem;
            width: 50px;
            text-align: center;
            color: var(--primary, #fff);
        }
        .map-category .category-name {
            font-size: 1.2rem;
            font-weight: bold;
            flex: 1;
        }
        .map-category .category-count {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .card-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        .role-card {
            width: 100%;
            max-width: 340px;
            min-height: 380px;
            background: var(--card-bg, rgba(0,0,0,0.6));
            border-radius: 32px;
            border: 2px solid var(--primary, #fff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: 0.1s linear;
            padding: 20px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }
        .role-card.pressed {
            box-shadow: 0 0 20px 8px var(--glow, rgba(255,255,255,0.3));
            transform: scale(0.98);
        }
        .fingerprint-icon {
            font-size: 4.5rem;
            margin-bottom: 20px;
            color: var(--primary, #fff);
        }
        .role-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .role-card.pressed .role-content {
            display: flex;
        }
        .role-card.pressed .front-content {
            display: none;
        }
        .front-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .timer-text { font-size: 4rem; text-align: center; margin: 40px 0; font-family: monospace; font-weight: bold; }
        .time-selector { display: flex; gap: 10px; margin: 15px 0; }
        .time-btn { flex: 1; padding: 10px; border-radius: 20px; text-align: center; cursor: pointer; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }
        .time-btn.selected { background: var(--primary); color: #000; }
        .player-row {
            background: var(--card-bg, rgba(0,0,0,0.6));
            padding: 12px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .player-row input { background: none; border: none; color: #fff; flex: 1; font-size: 1rem; text-align: right; outline: none; }
        .remove-icon { margin-left: 10px; cursor: pointer; color: var(--primary); }
        .vote-turn-card { border-radius: 30px; padding: 30px; text-align: center; margin-bottom: 30px; background: var(--card-bg, rgba(0,0,0,0.6)); border: 1px solid rgba(255,255,255,0.2); }
        .vote-turn-name { font-size: 2rem; font-weight: bold; margin-bottom: 20px; color: var(--primary); }
        .vote-options { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .vote-option-btn { padding: 15px; border-radius: 25px; font-size: 1.1rem; cursor: pointer; transition: 0.2s; text-align: center; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }
        .vote-option-btn:hover { background: var(--primary); color: #000; }
        .vote-progress { text-align: center; margin-top: 20px; }
        .vote-results { background: var(--card-bg, rgba(0,0,0,0.6)); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .vote-result-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .vote-count { color: var(--primary); font-weight: bold; }
        .players-list { background: var(--card-bg, rgba(0,0,0,0.6)); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .players-list h3 { color: var(--primary); margin-bottom: 10px; }
        .side-menu {
            position: fixed; top: 0; right: -300px; width: 280px; z-index: 2000; transition: 0.4s;
            padding: 80px 20px 30px; overflow-y: auto;
            background: var(--card-bg, #0a0a0f);
            border-left: 2px solid var(--primary);
        }
        .side-menu.open { right: 0; }
        .menu-overlay { position: fixed; inset: 0; z-index: 1999; display: none; background: rgba(0,0,0,0.8); }
        .menu-overlay.show { display: block; }
        .home-content { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; height: 100%; }
        .info-card { background: var(--card-bg, #1a1a24); border-radius: 24px; padding: 20px; }

        .elimination-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: var(--primary);
            color: #000;
            padding: 15px 20px;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            z-index: 500;
            animation: slideUp 0.3s ease-out;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ثيمات أونلاين فقط */
        .room-code {
            font-size: 2rem;
            text-align: center;
            letter-spacing: 5px;
            background: var(--primary);
            color: #000;
            padding: 15px;
            border-radius: 20px;
            font-weight: bold;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .copy-btn {
            background: rgba(0,0,0,0.2);
            border: none;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .chat-container {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            height: 250px;
            display: flex;
            flex-direction: column;
            margin: 15px 0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-message {
            display: flex;
            margin: 4px 0;
        }
        .chat-message.my-message {
            justify-content: flex-start;
        }
        .chat-message.other-message {
            justify-content: flex-end;
        }
        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 0.9rem;
        }
        .chat-message.my-message .message-bubble {
            background: var(--primary);
            color: #000;
            border-bottom-left-radius: 4px;
        }
        .chat-message.other-message .message-bubble {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message-name {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 3px;
            display: block;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
        }
        .chat-input-area button {
            background: var(--primary);
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .countdown-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            color: var(--primary);
            background: rgba(0,0,0,0.85);
            padding: 30px 50px;
            border-radius: 60px;
            z-index: 3000;
            font-weight: bold;
        }
        .ready-status {
            text-align: center;
            margin-top: 15px;
            color: var(--primary);
        }
        
        .quick-intro {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .quick-intro.show { opacity: 1; visibility: visible; }
        .quick-intro .spy-icon { font-size: 4rem; animation: quickPulse 0.3s ease-out; }
        .quick-intro .spy-letters { display: flex; flex-direction: row-reverse; margin-top: 20px; }
        .quick-intro .spy-letters span {
            font-family: 'Orbitron';
            font-size: 2rem;
            font-weight: 900;
            margin: 0 5px;
            opacity: 0;
            transform: translateY(20px);
            animation: quickLetterReveal 0.2s forwards;
        }
        @keyframes quickPulse {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes quickLetterReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        body.theme-cinema { --primary: #ffd93d; --card-bg: rgba(0,0,0,0.6); background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 100%); color: #ffd93d; }
        body.theme-newspaper { --primary: #d4af7a; --card-bg: rgba(0,0,0,0.6); background: #1a140e; color: #d4af7a; }
        body.theme-warzone { --primary: #8b7355; --card-bg: rgba(0,0,0,0.7); background: #0f0c08; color: #8b7355; }
        body.theme-hologram { --primary: #00ccff; --card-bg: rgba(0,204,255,0.1); background: #03030f; color: #00ccff; }
        body.theme-cartoon { --primary: #ff9999; --card-bg: rgba(0,0,0,0.5); background: #1a0f0f; color: #ff9999; }
        
        body.theme-cinema .app-header { background: rgba(0,0,0,0.8); border-bottom: 2px solid #ffd93d; }
        body.theme-cinema .logo { font-family: 'Monoton', cursive; }
        body.theme-cinema .main-btn { background: linear-gradient(45deg, #ffd93d, #ffb347); clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); }
        
        body.theme-newspaper .app-header { background: #0a0704; border-bottom: 2px solid #d4af7a; }
        body.theme-newspaper .logo { font-family: 'Amiri', serif; }
        body.theme-newspaper .main-btn { background: #8b6b42; box-shadow: 4px 4px 0 #5a3a1a; }
        
        body.theme-warzone .app-header { background: #050403; border-bottom: 2px solid #8b7355; }
        body.theme-warzone .logo { font-family: 'Orbitron'; }
        body.theme-warzone .main-btn { background: #2a241c; border: 1px solid #8b7355; }
        
        body.theme-hologram .app-header { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid #00ccff; }
        body.theme-hologram .logo { font-family: 'Press Start 2P'; font-size: 0.7rem; text-shadow: 0 0 5px #00ccff; }
        body.theme-hologram .main-btn { background: transparent; border: 1px solid #00ccff; box-shadow: 0 0 8px #00ccff; }
        
        body.theme-cartoon .app-header { background: #2a1a1a; border-bottom: 3px dotted #ff9999; }
        body.theme-cartoon .logo { font-family: 'Comic Neue', cursive; }
        body.theme-cartoon .main-btn { background: #aa5555; border-radius: 30px; border: 2px solid #ff9999; box-shadow: 4px 4px 0 #ff9999; }
        
        .player-item { padding: 8px; background: rgba(0,0,0,0.3); margin: 5px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;}
        
        .game-over-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .game-over-buttons .main-btn {
            flex: 1;
            margin-top: 0;
        }

        .map-selector-host {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        
        .enter-game-btn {
            background: var(--primary);
            color: #000;
            margin-top: 20px;
            padding: 12px;
            font-weight: bold;
        }
        
        .vote-simultaneous {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .vote-candidate-btn {
            padding: 15px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .vote-candidate-btn:hover {
            background: var(--primary);
            color: #000;
        }
        .vote-waiting {
            text-align: center;
            padding: 20px;
            color: var(--primary);
        }

        /* تعديلات تصويت الأوفلاين */
        #voteTurnContainer {
            width: 100%;
        }
    </style>
</head>
<body class="theme-cinema">

<div id="voiceControlBtn" class="voice-control-btn" onclick="toggleMic()">
    <i id="micIcon" class="fas fa-microphone-slash"></i>
</div>

<div class="app-header">
    <div class="menu-icon" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="logo"><i class="fas fa-user-secret"></i> SPY</div>
    <div style="width: 24px;"></div>
</div>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <h2 style="font-family: 'Orbitron'; color: var(--primary); margin-bottom: 20px;">الإعدادات</h2>
    <p>ثيمات غامقة:</p>
    <button class="main-btn" onclick="switchTheme('cinema')">🎬 سينمائي</button>
    <button class="main-btn" onclick="switchTheme('newspaper')">📰 جريدة قديمة</button>
    <button class="main-btn" onclick="switchTheme('warzone')">⚔️ حرب</button>
    <button class="main-btn" onclick="switchTheme('hologram')">💠 هولوجرام</button>
    <button class="main-btn" onclick="switchTheme('cartoon')">🎨 كارتون</button>
    <hr style="margin: 15px 0; border-color: #333;">
    <div class="info-card"><i class="fas fa-user-secret fa-2x" style="color: var(--primary);"></i><p style="margin-top: 10px;">إصدار 6.0</p><p>تصميم: Mohamed Zidan</p></div>
    <button class="main-btn" onclick="resetGameToHome()" style="background: #333; color: #fff;">الرئيسية</button>
</div>

<div id="quickIntro" class="quick-intro">
    <div class="spy-icon"><i class="fas fa-user-secret" id="quickIcon"></i></div>
    <div class="spy-letters" id="quickLetters">
        <span>S</span><span>P</span><span>Y</span>
    </div>
</div>

<div id="homeScreen" class="screen active">
    <div class="home-content">
        <i class="fas fa-user-secret" style="font-size: 100px; color: #ffffff; margin-bottom: 30px;"></i>
        <h1 style="font-family: 'Orbitron'; margin-bottom: 40px; color: #ffffff;">SPY</h1>
        <div style="width: 100%; max-width: 300px;">

    async function toggleMic() {
        if (!isMicOn) {
            try {
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await agoraClient.publish([localAudioTrack]);
                isMicOn = true;
                document.getElementById('voiceControlBtn').classList.add('on');
                document.getElementById('micIcon').className = 'fas fa-microphone';
                db.ref(`rooms/${currentRoomId}/speaking/${currentPlayerName}`).set(true);
            } catch (e) { alert("تأكد من السماح بصلاحية الميكروفون"); }
        } else {
            if (localAudioTrack) {
                localAudioTrack.stop();
                localAudioTrack.close();
                await agoraClient.unpublish();
            }
            isMicOn = false;
            document.getElementById('voiceControlBtn').classList.remove('on');
            document.getElementById('micIcon').className = 'fas fa-microphone-slash';
            db.ref(`rooms/${currentRoomId}/speaking/${currentPlayerName}`).set(false);
        }
    }

    // ==================== البيانات الأصلية ====================

        'cities': ["القاهرة", "باريس", "نيويورك", "طوكيو", "لندن", "دبي", "روما", "برلين", "موسكو", "بكين", "اسطنبول", "سيدني", "مومباي", "سان فرانسيسكو", "مدينة مكسيكو", "ريو دي جانيرو", "كيب تاون", "سنغافورة", "برشلونة", "فيينا", "بودابست", "براغ"],
        'entertainment': ["ستوديو أفلام", "مدينة ألعاب", "سيرك", "دار أوبرا", "ملعب كرة قدم", "حلبة سباق", "قاعة مؤتمرات", "نادي ليلي", "منتجع صحي", "شاطئ خاص", "منتزه مائي", "قصر ثقافة", "مسرح", "صالة بولينغ", "مركز غوص", "مزرعة ترفيهية"]
    };

    const howtoData = [
        { icon: "fas fa-theater-masks", title: "🎭 الأدوار", desc: "يتم توزيع الأدوار عشوائياً: أحدكم هو الجاسوس، والباقي عملاء يعرفون الموقع السري." },
        { icon: "fas fa-fingerprint", title: "🕵️ مرحلة الأدوار", desc: "اضغط على البصمة لرؤية دورك. سيظهر للموظفين الموقع، وللجاسوس رسالة أنه لا يعرف المكان." },
        { icon: "fas fa-comments", title: "💬 النقاش", desc: "لديكم وقت محدد للتحدث وطرح الأسئلة، محاولين اكتشاف الجاسوس دون كشف المكان." },
        { icon: "fas fa-vote-yea", title: "⚖️ التصويت", desc: "كل لاعب يدلي بصوته على من يشتبه به. اللاعب الأكثر أصواتاً يتم اتهامه. إذا كان جاسوساً يفوز العملاء، وإذا كان بريئاً يُقصى وتستمر الجولة." },
        { icon: "fas fa-trophy", title: "🏆 الفوز", desc: "يفوز العملاء إذا تم اكتشاف الجاسوس. يفوز الجاسوس إذا بقي معه لاعب واحد فقط." }
    ];
    
    // ==================== متغيرات عامة ====================
    let gameMode = null;
    let players = [], activePlayers = [], spyIndex = -1, currentLocation = "", selectedMapKey = 'public', selectedTime = 300;
    let currentPlayerIndex = 0, hasSeenRole = false, timerInterval = null, gameActive = true;
    let votes = {}, voteOrder = [], currentVoterIndex = 0;
    
    // متغيرات أونلاين
    let currentRoomId = null, currentPlayerName = null, isHost = false;
    let onlinePlayers = [], onlineSpyIndex = -1, onlineLocation = "", gameStarted = false;
    let chatListener = null;
    let isVotingActive = false;
    let onlineSelectedMapKey = 'public';
    let hasEnteredGame = false;
    let voteListener = null;
    let hasVoted = false;

    // ==================== دوال مساعدة ====================
    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
    function navTo(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function showNotification(msg) { let n = document.createElement('div'); n.className = 'elimination-message'; n.innerHTML = msg; document.body.appendChild(n); setTimeout(() => n.remove(), 3000); }
    function switchTheme(theme) { document.body.className = 'theme-' + theme; toggleMenu(); const quickIntro = document.getElementById('quickIntro'); quickIntro.classList.add('show'); setTimeout(() => quickIntro.classList.remove('show'), 500); }
    function resetGameToHome() { 
        if(timerInterval) clearInterval(timerInterval); 
        if(currentRoomId) leaveOnlineRoom(); 
        navTo('homeScreen'); 
        gameMode = null; 
        gameActive = true;
        isVotingActive = false;
        hasEnteredGame = false;
        hasVoted = false;
        document.getElementById('voiceControlBtn').style.display = 'none';
    }
    function goHome() { resetGameToHome(); }
    function copyRoomCode() { const code = document.getElementById('roomCodeText').innerText; navigator.clipboard.writeText(code); showNotification("✅ تم نسخ الكود: " + code); }
    
    function openHowtoVideo() {
        navTo('howto');
        const container = document.getElementById('videoContainer');
        container.innerHTML = '';
        const welcomeDiv = document.createElement('div'); welcomeDiv.className = 'welcome-screen'; welcomeDiv.innerHTML = `<div class="welcome-icon"><i class="fas fa-user-secret"></i></div><div class="welcome-title">أهلاً بك في SPY</div><div class="welcome-sub">إليك شرح طريقة اللعب...</div>`;
        container.appendChild(welcomeDiv);
        const gridDiv = document.createElement('div'); gridDiv.className = 'info-grid';
        howtoData.forEach(data => { const card = document.createElement('div'); card.className = 'info-card-item'; card.innerHTML = `<div class="card-icon"><i class="${data.icon}"></i></div><div class="card-content"><h3>${data.title}</h3><p>${data.desc}</p></div>`; gridDiv.appendChild(card); });
        container.appendChild(gridDiv);
        const timeline = document.createElement('div'); timeline.className = 'timeline-bar'; timeline.innerHTML = '<div class="timeline-progress"></div>'; container.appendChild(timeline);
        const closeBtn = document.createElement('button'); closeBtn.className = 'main-btn close-howto-btn'; closeBtn.innerText = 'رجوع للرئيسية'; closeBtn.onclick = () => navTo('homeScreen'); container.appendChild(closeBtn);
    }

    // ==================== أوفلاين ====================
    function startOfflineMode() { gameMode = 'offline'; buildMapList(); setupTimeSelector(); buildPlayerList(); navTo('mapSelection'); }
    function buildMapList() {
        const container = document.getElementById('mapList'); container.innerHTML = '';
        const categories = [
            { key: 'public', name: 'أماكن عامة', icon: 'fa-city', count: MAP_DATA['public'].length },
            { key: 'sci-fi', name: 'خيال علمي', icon: 'fa-atom', count: MAP_DATA['sci-fi'].length },
            { key: 'travel', name: 'معالم سياحية', icon: 'fa-landmark', count: MAP_DATA['travel'].length },
            { key: 'home', name: 'المنزل', icon: 'fa-home', count: MAP_DATA['home'].length },
            { key: 'cities', name: 'مدن عالمية', icon: 'fa-globe', count: MAP_DATA['cities'].length },
            { key: 'entertainment', name: 'ترفيه', icon: 'fa-gamepad', count: MAP_DATA['entertainment'].length }
        ];
        categories.forEach(cat => {
            const div = document.createElement('div'); div.className = 'map-category' + (cat.key === selectedMapKey ? ' selected' : ''); div.setAttribute('data-map', cat.key);
            div.innerHTML = `<i class="fas ${cat.icon}"></i><span class="category-name">${cat.name}</span><span class="category-count">${cat.count} مكان</span>`;
            div.onclick = () => { document.querySelectorAll('.map-category').forEach(c => c.classList.remove('selected')); div.classList.add('selected'); selectedMapKey = cat.key; };
            container.appendChild(div);
        });
    }
    function setupTimeSelector() { const btns = document.querySelectorAll('.time-btn'); btns.forEach(btn => btn.onclick = () => { btns.forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedTime = parseInt(btn.getAttribute('data-time')); }); }
    function buildPlayerList() { const container = document.getElementById('list'); container.innerHTML = ''; for (let i = 0; i < 3; i++) { const row = document.createElement('div'); row.className = 'player-row'; row.innerHTML = `<i class="fas fa-times remove-icon" onclick="this.parentElement.remove()"></i><input type="text" placeholder="أضف اسمك هنا" class="p-name">`; container.appendChild(row); } }
    function addPlayer() { const container = document.getElementById('list'); const row = document.createElement('div'); row.className = 'player-row'; row.innerHTML = `<i class="fas fa-times remove-icon" onclick="this.parentElement.remove()"></i><input type="text" placeholder="أضف اسمك هنا" class="p-name">`; container.appendChild(row); }
    function startOfflineGame() {
        players = Array.from(document.querySelectorAll('.p-name')).map(i => i.value.trim()).filter(p => p !== "");
        if (players.length < 3) { showNotification("يجب أن يكون 3 لاعبين على الأقل"); return; }
        activePlayers = [...players];
        const locationList = MAP_DATA[selectedMapKey];
        currentLocation = locationList[Math.floor(Math.random() * locationList.length)];
        spyIndex = Math.floor(Math.random() * players.length);
        currentPlayerIndex = 0; hasSeenRole = false;
        showOfflineRoleScreen();
    }
    function showOfflineRoleScreen() {
        navTo('rolesScreen');
        document.getElementById('turnText').innerText = players[currentPlayerIndex];
        const roleContent = document.getElementById('roleContent');
        roleContent.innerHTML = (currentPlayerIndex === spyIndex) ? `<i class="fas fa-user-secret fa-4x" style="color:red"></i><h2>❗ أنت الجاسوس ❗</h2><p>لا تعرف المكان. استمع جيداً للأسئلة وحاول اكتشافه.</p>` : `<i class="fas fa-map-marker-alt fa-3x" style="color:var(--primary)"></i><p>الموقع السري:</p><h1>${currentLocation}</h1>`;
        document.getElementById('roleCard').classList.remove('pressed');
        document.getElementById('roleNextContainer').innerHTML = '';
        hasSeenRole = false;
        attachPressEvents(document.getElementById('roleCard'), true);
    }
    function attachPressEvents(card, isOffline) {
        const startPress = (e) => { e.preventDefault(); if (!gameActive) return; card.classList.add('pressed'); if (!hasSeenRole) { hasSeenRole = true; if(isOffline) document.getElementById('roleNextContainer').innerHTML = '<button class="main-btn enter-game-btn" onclick="enterOfflineGame()">🎮 دخول اللعبة</button>'; } };
        const endPress = (e) => { e.preventDefault(); card.classList.remove('pressed'); };
        card.addEventListener('mousedown', startPress); card.addEventListener('mouseup', endPress); card.addEventListener('mouseleave', endPress);
        card.addEventListener('touchstart', startPress, { passive: false }); card.addEventListener('touchend', endPress); card.addEventListener('touchcancel', endPress);
    }
    function enterOfflineGame() {
        currentPlayerIndex++;
        if (currentPlayerIndex < players.length) {
            showOfflineRoleScreen();
        } else {
            startOfflineGameplay();
        }
    }
    function startOfflineGameplay() { updatePlayersListDisplay(players); navTo('gameplay'); document.getElementById('chatContainer').style.display = 'none'; startTimer(selectedTime); }
    
    // ==================== أونلاين ====================
    function showOnlineMenu() { gameMode = 'online'; navTo('onlineMenuScreen'); }
    function backToOnlineMenu() { navTo('onlineMenuScreen'); }
    function showCreateRoomUI() { navTo('createRoomScreen'); }
    function showJoinRoomUI() { navTo('joinRoomScreen'); }
    
    function buildOnlineMapListForHost() {
        const container = document.getElementById('onlineMapList');
        if(!container) return;
        container.innerHTML = '';
        const categories = [
            { key: 'public', name: 'أماكن عامة', icon: 'fa-city' },
            { key: 'sci-fi', name: 'خيال علمي', icon: 'fa-atom' },
            { key: 'travel', name: 'معالم سياحية', icon: 'fa-landmark' },
            { key: 'home', name: 'المنزل', icon: 'fa-home' },
            { key: 'cities', name: 'مدن عالمية', icon: 'fa-globe' },
            { key: 'entertainment', name: 'ترفيه', icon: 'fa-gamepad' }
        ];
        categories.forEach(cat => {
            const div = document.createElement('div'); 
            div.className = 'map-category' + (cat.key === onlineSelectedMapKey ? ' selected' : ''); 
            div.innerHTML = `<i class="fas ${cat.icon}"></i><span class="category-name">${cat.name}</span><span class="category-count">${MAP_DATA[cat.key].length} مكان</span>`;
            div.onclick = () => { 
                document.querySelectorAll('#onlineMapList .map-category').forEach(c => c.classList.remove('selected')); 
                div.classList.add('selected'); 
                onlineSelectedMapKey = cat.key;
                db.ref('rooms/' + currentRoomId).update({ selectedMap: onlineSelectedMapKey });
            };
            container.appendChild(div);
        });
    }
    
    function createOnlineRoom() {
        let name = document.getElementById('onlineHostName').value.trim();
        if(!name) { showNotification("أدخل اسمك"); return; }
        currentPlayerName = name; isHost = true;
        currentRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        db.ref('rooms/' + currentRoomId).set({ 
            players: [name], 
            host: name, 
            status: "waiting", 
            createdAt: Date.now(),
            selectedMap: 'public',
            gameStarted: false
        });
        listenToOnlineRoom();
        document.getElementById('roomCodeText').innerText = currentRoomId;
        navTo('onlineWaitingScreen');
        setTimeout(() => {
            if(isHost) {
                document.getElementById('hostMapSelector').style.display = 'block';
                buildOnlineMapListForHost();
            }
        }, 100);
    }
    
    function joinOnlineRoom() {
        let code = document.getElementById('joinRoomCodeInput').value.trim().toUpperCase();
        let name = document.getElementById('joinPlayerNameInput').value.trim();
        if(!code || !name) { showNotification("أدخل الكود والاسم"); return; }
        db.ref('rooms/' + code).once('value', snap => {
            if(!snap.exists()) { showNotification("الغرفة غير موجودة"); return; }
            let room = snap.val();
            if(room.status !== "waiting") { showNotification("اللعبة بدأت بالفعل"); return; }
            if(room.players.includes(name)) { showNotification("الاسم موجود"); return; }
            room.players.push(name);
            db.ref('rooms/' + code).update({ players: room.players }).then(() => {
                currentRoomId = code; currentPlayerName = name; isHost = false;
                listenToOnlineRoom();
                document.getElementById('roomCodeText').innerText = code;
                navTo('onlineWaitingScreen');
            });
        });
    }
    
    function listenToOnlineRoom() {
        db.ref('rooms/' + currentRoomId).on('value', snap => {
            let room = snap.val();
            if(!room) return;
            onlinePlayers = room.players || [];
            let container = document.getElementById('waitingPlayersList');
            if(container) { container.innerHTML = "<h3>اللاعبون:</h3>" + onlinePlayers.map(p => `<div class="player-item"><span>${p}</span>${p === room.host ? ' 👑' : ''}</div>`).join(''); }
            let startBtn = document.getElementById('startOnlineGameBtn');
            if(startBtn && isHost && onlinePlayers.length >= 3 && !room.gameStarted) startBtn.style.display = 'block';
            
            if(room.selectedMap && isHost) {
                onlineSelectedMapKey = room.selectedMap;
                buildOnlineMapListForHost();
            }
            
            if(room.status === "playing" && !gameStarted && room.gameStarted) {
                gameStarted = true;
                onlineLocation = room.location;
                onlineSpyIndex = room.spyIndex;
                activePlayers = [...onlinePlayers];
                showOnlineRoleScreen();
            }
            
            if(room.voteTrigger && !isVotingActive) { 
                if(timerInterval) clearInterval(timerInterval);
                isVotingActive = true; 
                startSimultaneousVote();
                db.ref('rooms/' + currentRoomId + '/voteTrigger').remove();
            }
            
            if(room.voteResults) { 
                showVoteResultsScreen(room.voteResults); 
            }
            
            if(room.nextRound) {
                continueAfterVote();
                db.ref('rooms/' + currentRoomId + '/nextRound').remove();
            }
        });
    }
    
    function hostStartOnlineGame() {
        if(!isHost) return;
        let locationList = MAP_DATA[onlineSelectedMapKey];
        let randomLocation = locationList[Math.floor(Math.random() * locationList.length)];
        let randomSpy = Math.floor(Math.random() * onlinePlayers.length);
        db.ref('rooms/' + currentRoomId).update({ 
            status: "playing", 
            location: randomLocation, 
            spyIndex: randomSpy, 
            gameStarted: true
        });
        
        let count = 3;
        const overlay = document.createElement('div'); overlay.className = 'countdown-overlay'; overlay.innerText = count; document.body.appendChild(overlay);
        const interval = setInterval(() => { count--; if(count <= 0) { clearInterval(interval); overlay.remove(); } else overlay.innerText = count; }, 1000);
    }
    
    function showOnlineRoleScreen() {
        navTo('rolesScreen');
        let myIndex = onlinePlayers.indexOf(currentPlayerName);
        let isSpy = (myIndex === onlineSpyIndex);
        document.getElementById('turnText').innerText = currentPlayerName;
        document.getElementById('roleContent').innerHTML = isSpy ? `<i class="fas fa-user-secret fa-4x" style="color:red"></i><h2>❗ أنت الجاسوس ❗</h2><p>لا تعرف المكان. استمع جيداً للأسئلة وحاول اكتشافه.</p>` : `<i class="fas fa-map-marker-alt fa-3x" style="color:var(--primary)"></i><p>الموقع السري:</p><h1>${onlineLocation}</h1>`;
        document.getElementById('roleCard').classList.remove('pressed');
        document.getElementById('roleNextContainer').innerHTML = '';
        attachOnlinePressEvents(document.getElementById('roleCard'));
    }
    
    function attachOnlinePressEvents(card) {
        const startPress = (e) => { 
            e.preventDefault(); 
            card.classList.add('pressed');
            if (!hasSeenRole) { 
                hasSeenRole = true;
                document.getElementById('roleNextContainer').innerHTML = '<button class="main-btn enter-game-btn" onclick="enterOnlineGame()">🎮 دخول اللعبة</button>';
            }
        };
        const endPress = (e) => { e.preventDefault(); card.classList.remove('pressed'); };
        card.addEventListener('mousedown', startPress); card.addEventListener('mouseup', endPress); card.addEventListener('mouseleave', endPress);
        card.addEventListener('touchstart', startPress, { passive: false }); card.addEventListener('touchend', endPress);
    }
    
    async function enterOnlineGame() {
        if(hasEnteredGame) return;
        hasEnteredGame = true;
        
        // ربط الصوت عند دخول اللعبة
        await agoraClient.join(AGORA_APP_ID, currentRoomId, null, null);
        document.getElementById('voiceControlBtn').style.display = 'flex';
        listenToSpeaking();
        
        startOnlineGameplay();
    }
    
    function startOnlineGameplay() {
        navTo('gameplay');
        updatePlayersListDisplay(onlinePlayers);
        document.getElementById('chatContainer').style.display = 'flex';
        startTimer(300);
        setupChat();
    }
    
    // ==================== نظام التصويت المتزامن (أونلاين) ====================
    function startSimultaneousVote() {
        document.getElementById('voteTurnContainer').style.display = 'none';
        document.getElementById('voteSimultaneousContainer').style.display = 'block';
        hasVoted = false;
        const container = document.getElementById('voteSimultaneousContainer');
        const others = activePlayers.filter(p => p !== currentPlayerName);
        
        container.innerHTML = `
            <div class="vote-turn-card">
                <div class="vote-turn-name">🗳️ اختر من تشك به</div>
                <div class="vote-simultaneous" id="voteOptionsList"></div>
                <div class="vote-progress" id="voteStatus">في انتظار تصويت الجميع...</div>
            </div>
        `;
        
        const optionsList = document.getElementById('voteOptionsList');
        others.forEach(player => {
            const btn = document.createElement('div');
            btn.className = 'vote-candidate-btn';
            btn.innerText = player;
            btn.onclick = () => submitVote(player);
            optionsList.appendChild(btn);
        });
        
        if(voteListener) db.ref('rooms/' + currentRoomId + '/votes').off();
        voteListener = db.ref('rooms/' + currentRoomId + '/votes').on('value', snap => {
            const allVotes = snap.val() || {};
            const votedCount = Object.keys(allVotes).length;
            const statusDiv = document.getElementById('voteStatus');
            if(statusDiv) { statusDiv.innerText = `✅ تم التصويت: ${votedCount} من ${activePlayers.length}`; }
            if(votedCount === activePlayers.length) { calculateOnlineVoteResults(allVotes); }
        });
        
        navTo('votePage');
    }
    
    function submitVote(selectedPlayer) {
        if(hasVoted) { showNotification("لقد قمت بالتصويت بالفعل!"); return; }
        hasVoted = true;
        db.ref('rooms/' + currentRoomId + '/votes/' + currentPlayerName).set(selectedPlayer);
        const optionsList = document.getElementById('voteOptionsList');
        if(optionsList) { optionsList.innerHTML = '<div class="vote-waiting">✅ تم تسجيل صوتك! في انتظار باقي اللاعبين...</div>'; }
    }
    
    function calculateOnlineVoteResults(allVotes) {
        let voteCount = {};
        Object.values(allVotes).forEach(v => voteCount[v] = (voteCount[v] || 0) + 1);
        let maxVotes = 0, accused = null;
        for(let [player, count] of Object.entries(voteCount)) { if(count > maxVotes) { maxVotes = count; accused = player; } }
        let accusedIndex = activePlayers.indexOf(accused);
        let currentSpyPlayer = onlinePlayers[onlineSpyIndex];
        let isSpy = (accused === currentSpyPlayer);
        let resultMsg, gameWinner = null;
        if(isSpy) { resultMsg = `✅ تم اكتشاف الجاسوس (${accused})! العملاء يفوزون!`; gameWinner = 'agents'; }
        else {
            activePlayers = activePlayers.filter(p => p !== accused);
            let isSpyStillInGame = activePlayers.includes(currentSpyPlayer);
            if(activePlayers.length <= 2 && isSpyStillInGame) { resultMsg = `❌ تم اتهام ${accused} (بريء)! تبقى ${activePlayers.length} لاعبين مع الجاسوس! الجاسوس يفوز!`; gameWinner = 'spy'; }
            else { resultMsg = `❌ تم اتهام ${accused} (بريء)! تم إقصاء ${accused}. تستمر اللعبة مع ${activePlayers.length} لاعبين.`; gameWinner = 'continue'; }
        }
        const resultsHtml = `<div class="vote-results"><h3>نتائج التصويت:</h3>${Object.entries(voteCount).map(([player, count]) => `<div class="vote-result-row"><span>${player}</span><span class="vote-count">${count} صوت</span></div>`).join('')}<hr><div style="text-align: center; padding: 15px;"><h3 style="color: var(--primary);">المتهم: ${accused}</h3><p>${resultMsg}</p></div></div>`;
        db.ref('rooms/' + currentRoomId + '/voteResults').set({ accused: accused, isSpy: isSpy, resultMsg: resultMsg, gameWinner: gameWinner, activePlayers: activePlayers, resultsHtml: resultsHtml });
        db.ref('rooms/' + currentRoomId + '/votes').remove();
        if(voteListener) voteListener();
    }
    
    // ==================== دوال مشتركة ====================
    function updatePlayersListDisplay(list) { 
        document.getElementById('playersNamesList').innerHTML = list.map(p => `
            <div class="player-item">
                <span>🎭 ${p}</span>
                <span id="speaker-${p}" class="speaking-indicator-ui"><i class="fas fa-microphone"></i></span>
            </div>
        `).join(''); 
    }
    
    function startTimer(seconds) {
        if(timerInterval) clearInterval(timerInterval);
        let remaining = seconds;
        const timerEl = document.getElementById('timer');
        function update() { let m = Math.floor(remaining/60), s = remaining%60; timerEl.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
        update();
        timerInterval = setInterval(() => { if(remaining <= 0) { clearInterval(timerInterval); triggerVote(); } else { remaining--; update(); } }, 1000);
    }
    
    function setupChat() {
        let container = document.getElementById('chatMessages'); container.innerHTML = '';
        if(chatListener) db.ref('rooms/' + currentRoomId + '/chats').off();
        chatListener = db.ref('rooms/' + currentRoomId + '/chats').on('child_added', snap => { 
            let msg = snap.val(); 
            if(msg) { 
                let isMyMessage = (msg.name === currentPlayerName);
                let div = document.createElement('div');
                div.className = `chat-message ${isMyMessage ? 'my-message' : 'other-message'}`;
                div.innerHTML = `<div class="message-bubble"><span class="message-name">${msg.name}</span><br>${msg.text}</div>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            } 
        });
    }
    
    function sendChatMessage() {
        let input = document.getElementById('chatInput'); let text = input.value.trim();
        if(!text || !currentRoomId) return;
        db.ref('rooms/' + currentRoomId + '/chats').push({ name: currentPlayerName, text: text });
        input.value = '';
    }
    
    function triggerVote() {
        if(timerInterval) clearInterval(timerInterval);
        if(gameMode === 'online') { db.ref('rooms/' + currentRoomId).update({ voteTrigger: true }); }
        else { startOfflineVote(); }
    }
    
    // ==================== تعديلات تصويت الأوفلاين (بالأدوار) ====================
    function startOfflineVote() {
        document.getElementById('voteSimultaneousContainer').style.display = 'none';
        document.getElementById('voteTurnContainer').style.display = 'block';
        votes = {}; 
        voteOrder = [...activePlayers]; 
        currentVoterIndex = 0;
        showNextVoter();
    }
    
    function showNextVoter() {
        if(currentVoterIndex >= voteOrder.length) { calculateOfflineVoteResult(); return; }
        let voter = voteOrder[currentVoterIndex];
        let others = activePlayers.filter(p => p !== voter);
        let container = document.getElementById('voteTurnContainer');
        
        container.innerHTML = `
            <div class="vote-turn-card" id="turnCard">
                <p style="margin-bottom:10px; opacity:0.8;">دور اللاعب الحالي:</p>
                <div class="vote-turn-name">👤 ${voter}</div>
                <div id="voterActionArea">
                    <p style="color:var(--primary); margin-bottom:15px;">اعطِ الجهاز لـ ${voter} ثم اضغط الزر بالأسفل</p>
                    <button class="main-btn" onclick="revealVoterOptions('${voter}')">أنا ${voter}، سأصوت الآن</button>
                </div>
                <div class="vote-progress" style="margin-top:20px;">تصويت ${currentVoterIndex + 1} من ${voteOrder.length}</div>
            </div>
        `;
        navTo('votePage');
    }

    function revealVoterOptions(voter) {
        let others = activePlayers.filter(p => p !== voter);
        let actionArea = document.getElementById('voterActionArea');
        
        let html = `<p style="margin-bottom:15px;">اختر الشخص الذي تعتقد أنه الجاسوس:</p><div class="vote-options">`;
        others.forEach(p => {
            html += `<div class="vote-option-btn" onclick="saveOfflineVote('${voter}', '${p}')">${p}</div>`;
        });
        html += `</div>`;
        actionArea.innerHTML = html;
    }

    function saveOfflineVote(voter, selectedPlayer) {
        votes[voter] = selectedPlayer;
        currentVoterIndex++;
        
        // إخفاء الخيارات فوراً لمنع اللاعب التالي من رؤيتها
        document.getElementById('voterActionArea').innerHTML = `
            <div style="padding:20px; color:var(--primary);">
                <i class="fas fa-check-circle fa-3x"></i>
                <p style="margin-top:10px;">تم تسجيل صوتك بنجاح!</p>
                <button class="main-btn" onclick="showNextVoter()">التالي ➔</button>
            </div>
        `;
    }
    
    function calculateOfflineVoteResult() {
        let voteCount = {};
        Object.values(votes).forEach(v => voteCount[v] = (voteCount[v] || 0) + 1);
        let maxVotes = 0, accused = null;
        for(let [player, count] of Object.entries(voteCount)) if(count > maxVotes) { maxVotes = count; accused = player; }
        
        let accusedIndex = activePlayers.indexOf(accused);
        let spyName = players[spyIndex];
        let isSpy = (accused === spyName);
        
        let resultMsg, gameWinner = null;
        
        if(isSpy) {
            resultMsg = `✅ تم اكتشاف الجاسوس (${accused})! العملاء يفوزون!`;
            gameWinner = 'agents';
        } else {
            activePlayers = activePlayers.filter(p => p !== accused);
            let isSpyStillInGame = activePlayers.includes(spyName);
            
            if(activePlayers.length <= 2 && isSpyStillInGame) {
                resultMsg = `❌ تم اتهام ${accused} (بريء)! تبقى ${activePlayers.length} لاعبين مع الجاسوس! الجاسوس يفوز!`;
                gameWinner = 'spy';
            } else {
                resultMsg = `❌ تم اتهام ${accused} (بريء)! تم إقصاء ${accused}. تستمر اللعبة مع ${activePlayers.length} لاعبين.`;
                gameWinner = 'continue';
            }
        }
        
        document.getElementById('resultsSection').innerHTML = `<div class="vote-results"><h3>نتائج التصويت:</h3>${Object.entries(voteCount).map(([player, count]) => `<div class="vote-result-row"><span>${player}</span><span class="vote-count">${count} صوت</span></div>`).join('')}<hr><div style="text-align: center; padding: 15px;"><h3 style="color: var(--primary);">المتهم: ${accused}</h3><p>${resultMsg}</p></div></div>`;
        
        const buttonsDiv = document.getElementById('gameOverButtons');
        if(gameWinner === 'agents' || gameWinner === 'spy') {
            buttonsDiv.innerHTML = `<button class="main-btn" onclick="resetGameToHome()">🏠 الرئيسية</button><button class="main-btn" onclick="playAgain()">🔄 لعب مرة أخرى</button>`;
        } else {
            buttonsDiv.innerHTML = `<button class="main-btn" onclick="continueAfterVote()">▶️ متابعة الجولة التالية</button>`;
        }
        
        navTo('voteResultsPage');
    }
    
    function playAgain() {
        if(gameMode === 'offline') {
            activePlayers = [...players];
            const locationList = MAP_DATA[selectedMapKey];
            currentLocation = locationList[Math.floor(Math.random() * locationList.length)];
            spyIndex = Math.floor(Math.random() * players.length);
            currentPlayerIndex = 0; hasSeenRole = false; gameActive = true;
            showOfflineRoleScreen();
        } else if(gameMode === 'online' && isHost) {
            let locationList = MAP_DATA[onlineSelectedMapKey];
            let randomLocation = locationList[Math.floor(Math.random() * locationList.length)];
            let randomSpy = Math.floor(Math.random() * onlinePlayers.length);
            db.ref('rooms/' + currentRoomId).update({ status: "playing", location: randomLocation, spyIndex: randomSpy, voteResults: null, gameStarted: true });
            gameStarted = false; isVotingActive = false; hasEnteredGame = false; hasVoted = false;
            onlineLocation = randomLocation; onlineSpyIndex = randomSpy;
            showOnlineRoleScreen();
        }
    }
    
    function continueAfterVote() {
        let currentSpyPlayer = (gameMode === 'offline') ? players[spyIndex] : onlinePlayers[onlineSpyIndex];
        let isSpyStillInGame = activePlayers.includes(currentSpyPlayer);
        
        if(activePlayers.length <= 2 && isSpyStillInGame) {
            showNotification("🎉 الجاسوس يفوز! تم القبض على الجميع!");
            resetGameToHome();
            return;
        }
        
        if(gameMode === 'offline') {
            navTo('gameplay');
            updatePlayersListDisplay(activePlayers);
            startTimer(selectedTime);
        } else if(gameMode === 'online') {
            db.ref('rooms/' + currentRoomId).update({ nextRound: true });
            navTo('gameplay');
            updatePlayersListDisplay(activePlayers);
            startTimer(300);
        }
        isVotingActive = false;
        hasVoted = false;
    }
    
    function showVoteResultsScreen(data) {
        document.getElementById('resultsSection').innerHTML = data.resultsHtml || `<div class="vote-results"><h3>نتائج التصويت:</h3><div style="text-align: center; padding: 15px;"><h3 style="color: var(--primary);">المتهم: ${data.accused}</h3><p>${data.resultMsg}</p></div></div>`;
        if(data.activePlayers) { activePlayers = data.activePlayers; }
        const buttonsDiv = document.getElementById('gameOverButtons');
        if(data.gameWinner === 'agents' || data.gameWinner === 'spy') {
            buttonsDiv.innerHTML = `<button class="main-btn" onclick="resetGameToHome()">🏠 الرئيسية</button><button class="main-btn" onclick="playAgain()">🔄 لعب مرة أخرى</button>`;
        } else {
            buttonsDiv.innerHTML = `<button class="main-btn" onclick="continueAfterVote()">▶️ متابعة الجولة التالية</button>`;
        }
        navTo('voteResultsPage');
    }
    
    async function leaveOnlineRoom() { 
        if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); }
        await agoraClient.leave();
        if(currentRoomId) db.ref('rooms/' + currentRoomId).remove(); 
        currentRoomId = null; navTo('homeScreen'); gameStarted = false; isVotingActive = false; hasEnteredGame = false; hasVoted = false;
        if(voteListener) voteListener();
        document.getElementById('voiceControlBtn').style.display = 'none';
    }
    
    // ربط الدوال بالنافذة
    window.attachPressEvents = attachPressEvents;
    window.triggerVote = triggerVote;
    window.sendChatMessage = sendChatMessage;
    window.startOfflineMode = startOfflineMode;
    window.showOnlineMenu = showOnlineMenu;
    window.showCreateRoomUI = showCreateRoomUI;
    window.showJoinRoomUI = showJoinRoomUI;
    window.createOnlineRoom = createOnlineRoom;
    window.joinOnlineRoom = joinOnlineRoom;
    window.hostStartOnlineGame = hostStartOnlineGame;
    window.leaveOnlineRoom = leaveOnlineRoom;
    window.backToOnlineMenu = backToOnlineMenu;
    window.goHome = goHome;
    window.resetGameToHome = resetGameToHome;
    window.openHowtoVideo = openHowtoVideo;
    window.toggleMenu = toggleMenu;
    window.switchTheme = switchTheme;
    window.addPlayer = addPlayer;
    window.copyRoomCode = copyRoomCode;
    window.navTo = navTo;
    window.playAgain = playAgain;
    window.continueAfterVote = continueAfterVote;
    window.enterOfflineGame = enterOfflineGame;
    window.enterOnlineGame = enterOnlineGame;
    window.revealVoterOptions = revealVoterOptions;
    window.saveOfflineVote = saveOfflineVote;
    window.showNextVoter = showNextVoter;
    window.toggleMic = toggleMic;
</script>

<div id="intro" style="position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: introFadeOut 0.5s forwards; animation-delay: 3.5s;">
    <div style="font-size: 6rem; animation: iconPulse 1s ease-out;"><i class="fas fa-user-secret" style="color: #ffffff;"></i></div>
    <div style="display: flex; flex-direction: row-reverse; margin-top: 30px;">
        <span style="font-family: 'Orbitron'; font-size: 4rem; font-weight: 900; margin: 0 10px; opacity: 0; transform: translateY(30px); animation: letterReveal 0.4s forwards; animation-delay: 1.2s; color: #ffffff;">S</span>
        <span style="font-family: 'Orbitron'; font-size: 4rem; font-weight: 900; margin: 0 10px; opacity: 0; transform: translateY(30px); animation: letterReveal 0.4s forwards; animation-delay: 1.6s; color: #ffffff;">P</span>
        <span style="font-family: 'Orbitron'; font-size: 4rem; font-weight: 900; margin: 0 10px; opacity: 0; transform: translateY(30px); animation: letterReveal 0.4s forwards; animation-delay: 2.0s; color: #ffffff;">Y</span>
    </div>
    <div style="margin-top: 40px; font-size: 1rem; letter-spacing: 3px; opacity: 0; animation: fadeIn 0.5s forwards; animation-delay: 2.5s; color: #ffffff; font-family: 'Orbitron';">MOHAMED ZIDAN</div>
</div>
<style>
    @keyframes introFadeOut { to { opacity: 0; visibility: hidden; } }
    @keyframes iconPulse { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes letterReveal { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { to { opacity: 1; } }
</style>
